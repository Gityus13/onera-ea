<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Photo Gallery - ONERA EA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: transparent;
            overflow-x: hidden;
            font-family: 'Barlow', sans-serif;
        }

        /* Main container with horizontal scroll */
        .gallery-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            cursor: grab;
            position: relative;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            padding: 40px 0;
        }

        .gallery-container:active {
            cursor: grabbing;
        }

        /* Hide scrollbar but keep functionality */
        .gallery-container::-webkit-scrollbar {
            height: 4px;
        }

        .gallery-container::-webkit-scrollbar-track {
            background: rgba(200, 169, 110, 0.1);
            border-radius: 10px;
        }

        .gallery-container::-webkit-scrollbar-thumb {
            background: rgba(200, 169, 110, 0.5);
            border-radius: 10px;
        }

        .gallery-container::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 169, 110, 0.8);
        }

        /* Flex wrapper for horizontal layout */
        .gallery-track {
            display: flex;
            flex-direction: row;
            gap: 30px;
            padding: 0 10vw;
            width: max-content;
        }

        /* Individual slide */
        .slide {
            flex-shrink: 0;
            width: min(85vw, 700px);
            scroll-snap-align: start;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 169, 110, 0.2);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s ease;
        }

        .slide:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 169, 110, 0.3);
        }

        /* Image container */
        .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide:hover .image-wrapper img {
            transform: scale(1.05);
        }

        /* Caption overlay */
        .slide-caption {
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(20, 20, 20, 0.95));
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(200, 169, 110, 0.2);
        }

        .slide-number {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #c8a96e;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: inline-block;
        }

        .slide-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.03em;
            color: #f0ece4;
            margin-bottom: 8px;
        }

        .slide-desc {
            font-family: 'Barlow', sans-serif;
            font-size: 0.85rem;
            color: #8a8580;
            line-height: 1.5;
        }

        /* Navigation buttons */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(200, 169, 110, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 169, 110, 0.4);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInNav 0.5s ease forwards 0.5s;
        }

        @keyframes fadeInNav {
            to {
                opacity: 1;
            }
        }

        .nav-btn:hover {
            background: rgba(200, 169, 110, 0.35);
            border-color: #c8a96e;
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke: #c8a96e;
            stroke-width: 1.5;
            fill: none;
        }

        .nav-prev {
            left: 20px;
        }

        .nav-next {
            right: 20px;
        }

        /* Progress indicator */
        .progress-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 20;
            pointer-events: none;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(200, 169, 110, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            pointer-events: auto;
        }

        .progress-dot.active {
            width: 28px;
            border-radius: 4px;
            background: #c8a96e;
        }

        .progress-dot:hover {
            background: rgba(200, 169, 110, 0.7);
            transform: scale(1.2);
        }

        /* Scroll hint */
        .scroll-hint {
            text-align: center;
            padding: 16px 0 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #8a8580;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            border-top: 1px solid rgba(200, 169, 110, 0.1);
        }

        .scroll-hint svg {
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
            animation: scrollArrow 1.5s ease-in-out infinite;
        }

        @keyframes scrollArrow {
            0%, 100% {
                transform: translateX(0);
                opacity: 0.5;
            }
            50% {
                transform: translateX(5px);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-track {
                gap: 20px;
                padding: 0 20px;
            }
            .slide {
                width: 85vw;
            }
            .slide-title {
                font-size: 1.1rem;
            }
            .nav-btn {
                width: 36px;
                height: 36px;
            }
            .nav-btn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container" id="galleryContainer">
        <div class="gallery-track" id="galleryTrack">
            <!-- Slides will be dynamically generated -->
        </div>
    </div>
    <div class="progress-container" id="progressContainer"></div>
    <div class="scroll-hint">
        ←  Drag or scroll horizontally  →
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <button class="nav-btn nav-prev" id="prevBtn">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <button class="nav-btn nav-next" id="nextBtn">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script>
        // ============================================
        // PHOTO GALLERY DATA - 7 Slides with images
        // ============================================
        const slidesData = [
            {
                number: "01",
                title: "Premium Metal Structures",
                desc: "High-grade steel reinforcement and structural profiles for industrial construction projects.",
                image: "image1.png"
            },
            {
                number: "02",
                title: "Advanced Plumbing Systems",
                desc: "Durable water supply and sewage pipes with corrosion-resistant technology.",
                image: "image2.png"
            },
            {
                number: "03",
                title: "Sanitary & Fittings",
                desc: "Complete range of sanitary equipment, premium faucets, and installation fittings.",
                image: "image3.png"
            },
            {
                number: "04",
                title: "Electrical Infrastructure",
                desc: "High-performance electrical cables, conduits, and certified wiring solutions.",
                image: "image4.png"
            },
            {
                number: "05",
                title: "Construction Hardware",
                desc: "Essential fasteners, anchoring systems, and professional-grade hardware supplies.",
                image: "image5.png"
            },
            {
                number: "06",
                title: "Industrial Raw Materials",
                desc: "Bulk industrial feedstock and specialty materials for manufacturing excellence.",
                image: "image6.png"
            },
            {
                number: "07",
                title: "Complete Supply Chain",
                desc: "Integrated logistics and just-in-time delivery for major construction projects.",
                image: "image7.png"
            }
        ];

        // ============================================
        // DOM Elements
        // ============================================
        const container = document.getElementById('galleryContainer');
        const track = document.getElementById('galleryTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressContainer = document.getElementById('progressContainer');

        let currentIndex = 0;
        let slides = [];
        let isDragging = false;
        let startX = 0;
        let scrollLeft = 0;

        // ============================================
        // Generate Slides Dynamically
        // ============================================
        function generateSlides() {
            track.innerHTML = '';
            slidesData.forEach((slide, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                slideDiv.setAttribute('data-index', idx);
                
                slideDiv.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${slide.image}" alt="${slide.title}" loading="${idx === 0 ? 'eager' : 'lazy'}" onerror="this.src='https://placehold.co/800x450/1a1a1a/c8a96e?text=ONERA+EA+${slide.number}'">
                    </div>
                    <div class="slide-caption">
                        <span class="slide-number">${slide.number} / 07</span>
                        <h3 class="slide-title">${slide.title}</h3>
                        <p class="slide-desc">${slide.desc}</p>
                    </div>
                `;
                
                track.appendChild(slideDiv);
            });
            
            slides = document.querySelectorAll('.slide');
            updateProgressDots();
        }

        // ============================================
        // Progress Indicators
        // ============================================
        function updateProgressDots() {
            progressContainer.innerHTML = '';
            slidesData.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${idx === currentIndex ? 'active' : ''}`;
                dot.addEventListener('click', () => {
                    scrollToSlide(idx);
                });
                progressContainer.appendChild(dot);
            });
        }

        function updateActiveDot() {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // ============================================
        // Scroll to specific slide
        // ============================================
        function scrollToSlide(index) {
            if (index < 0) index = 0;
            if (index >= slides.length) index = slides.length - 1;
            
            const slide = slides[index];
            if (slide) {
                slide.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'start'
                });
                currentIndex = index;
                updateActiveDot();
            }
        }

        // ============================================
        // Navigation handlers
        // ============================================
        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                scrollToSlide(currentIndex + 1);
            } else {
                // Smooth bounce effect at end
                scrollToSlide(0);
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                scrollToSlide(currentIndex - 1);
            } else {
                scrollToSlide(slides.length - 1);
            }
        }

        // ============================================
        // Track scroll position and update current index
        // ============================================
        function updateCurrentIndexFromScroll() {
            if (!slides.length) return;
            
            const containerRect = container.getBoundingClientRect();
            const containerCenter = containerRect.left + containerRect.width / 2;
            
            let closestIndex = 0;
            let closestDistance = Infinity;
            
            slides.forEach((slide, idx) => {
                const rect = slide.getBoundingClientRect();
                const slideCenter = rect.left + rect.width / 2;
                const distance = Math.abs(containerCenter - slideCenter);
                
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestIndex = idx;
                }
            });
            
            if (closestIndex !== currentIndex) {
                currentIndex = closestIndex;
                updateActiveDot();
            }
        }

        // ============================================
        // Drag to scroll functionality (Apple-style)
        // ============================================
        function initDragScroll() {
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
                container.style.cursor = 'grabbing';
                container.style.scrollBehavior = 'auto';
            });
            
            container.addEventListener('mouseleave', () => {
                isDragging = false;
                container.style.cursor = 'grab';
                container.style.scrollBehavior = 'smooth';
            });
            
            container.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'grab';
                container.style.scrollBehavior = 'smooth';
                // Snap to nearest slide after drag
                setTimeout(() => {
                    updateCurrentIndexFromScroll();
                    if (slides[currentIndex]) {
                        slides[currentIndex].scrollIntoView({
                            behavior: 'smooth',
                            inline: 'start',
                            block: 'nearest'
                        });
                    }
                }, 50);
            });
            
            container.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const walk = (x - startX) * 1.2;
                container.scrollLeft = scrollLeft - walk;
            });
            
            // Touch support for mobile
            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].pageX - container.offsetLeft;
                scrollLeft = container.scrollLeft;
                container.style.scrollBehavior = 'auto';
            });
            
            container.addEventListener('touchend', () => {
                isDragging = false;
                container.style.scrollBehavior = 'smooth';
                setTimeout(() => {
                    updateCurrentIndexFromScroll();
                    if (slides[currentIndex]) {
                        slides[currentIndex].scrollIntoView({
                            behavior: 'smooth',
                            inline: 'start',
                            block: 'nearest'
                        });
                    }
                }, 50);
            });
            
            container.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const x = e.touches[0].pageX - container.offsetLeft;
                const walk = (x - startX) * 1;
                container.scrollLeft = scrollLeft - walk;
            });
        }

        // ============================================
        // Scroll event listener for index tracking
        // ============================================
        function initScrollListener() {
            let ticking = false;
            container.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        updateCurrentIndexFromScroll();
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        }

        // ============================================
        // Smooth snap after inertia scroll
        // ============================================
        let scrollTimeout;
        container.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (!isDragging) {
                    updateCurrentIndexFromScroll();
                    if (slides[currentIndex]) {
                        slides[currentIndex].scrollIntoView({
                            behavior: 'smooth',
                            inline: 'start',
                            block: 'nearest'
                        });
                    }
                }
            }, 150);
        });

        // ============================================
        // Keyboard navigation
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevSlide();
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
                e.preventDefault();
            }
        });

        // ============================================
        // Wheel horizontal scroll (shift + wheel or normal)
        // ============================================
        container.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY) || e.shiftKey) {
                e.preventDefault();
                container.scrollLeft += e.deltaY || e.deltaX;
            }
        }, { passive: false });

        // ============================================
        // Initialize gallery
        // ============================================
        function init() {
            generateSlides();
            initDragScroll();
            initScrollListener();
            
            // Add click listeners to nav buttons
            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                prevSlide();
            });
            
            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                nextSlide();
            });
            
            // Initial scroll to first slide
            setTimeout(() => {
                if (slides[0]) {
                    slides[0].scrollIntoView({ inline: 'start', block: 'nearest' });
                    currentIndex = 0;
                    updateActiveDot();
                }
            }, 100);
            
            // Handle image loading errors gracefully
            const images = document.querySelectorAll('.image-wrapper img');
            images.forEach(img => {
                img.addEventListener('error', function() {
                    const slideIndex = this.closest('.slide')?.getAttribute('data-index');
                    if (slideIndex && slidesData[slideIndex]) {
                        this.src = `https://placehold.co/800x450/1a1a1a/c8a96e?text=ONERA+EA+${slidesData[slideIndex].number}`;
                    }
                });
            });
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
