<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ONERA EA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid rgba(200, 169, 110, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #c8a96e;
        }

        .logo h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #c8a96e;
            margin-top: 12px;
        }

        .logo span {
            color: #f0ece4;
        }

        h2 {
            text-align: center;
            color: #f0ece4;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 32px;
            letter-spacing: 0.05em;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .google-btn, .apple-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Barlow', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: white;
            color: #1a1a1a;
        }

        .google-btn {
            background: white;
            color: #1a1a1a;
        }

        .apple-btn {
            background: black;
            color: white;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .apple-btn:hover {
            transform: translateY(-2px);
            background: #2c2c2c;
        }

        .divider {
            text-align: center;
            color: #8a8580;
            font-size: 0.85rem;
            margin: 24px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(200, 169, 110, 0.2);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .guest-link {
            text-align: center;
            margin-top: 24px;
        }

        .guest-link a {
            color: #c8a96e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .guest-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="https://i.ibb.co/5g5yr2pZ/logo.png" alt="ONERA EA">
            <h1>ONERA <span>EA</span></h1>
        </div>
        
        <h2>Welcome Back</h2>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="auth-buttons">
            <button class="google-btn" id="googleSignIn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            
            <button class="apple-btn" id="appleSignIn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.04-3.91 1.185-4.96 3.01-2.12 3.67-.54 9.11 1.52 12.09 1.01 1.45 2.22 3.08 3.8 3.02 1.52-.06 2.1-.99 3.94-.99 1.84 0 2.37.99 3.94.96 1.63-.03 2.67-1.48 3.68-2.93 1.16-1.66 1.64-3.27 1.66-3.36-.04-.02-3.19-1.22-3.22-4.86-.03-3.05 2.49-4.5 2.6-4.58-1.42-2.08-3.62-2.32-4.4-2.36-1.77-.08-3.22.99-4.04.99z"/>
                </svg>
                Continue with Apple
            </button>
        </div>
        
        <div class="divider">or</div>
        
        <div class="guest-link">
            <a href="#" onclick="continueAsGuest()">Continue as Guest</a>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Your actual Google Client ID
        const GOOGLE_CLIENT_ID = '694900292532-t534496odje7ot95fca2rvhpqqe5vr00.apps.googleusercontent.com';
        
        let currentUser = null;

        // Check if user is already logged in
        function checkExistingLogin() {
            const savedUser = localStorage.getItem('onera_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                redirectToMain();
            }
        }

        function redirectToMain() {
            window.location.href = 'index.html';
        }

        function saveUser(userData) {
            localStorage.setItem('onera_user', JSON.stringify(userData));
            currentUser = userData;
            redirectToMain();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Google Sign-In
        function initializeGoogleSignIn() {
            // Check if Google SDK is loaded
            if (typeof google === 'undefined' || !google.accounts) {
                console.error('Google SDK not loaded yet');
                setTimeout(initializeGoogleSignIn, 500);
                return;
            }
            
            try {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
                
                // Render the button
                google.accounts.id.renderButton(
                    document.getElementById('googleSignIn'),
                    { 
                        theme: 'outline', 
                        size: 'large', 
                        width: '100%',
                        text: 'continue_with',
                        shape: 'rectangular',
                        logo_alignment: 'left'
                    }
                );
                
                console.log('Google Sign-In initialized successfully');
            } catch (error) {
                console.error('Error initializing Google Sign-In:', error);
                showError('Failed to initialize Google Sign-In. Please refresh the page.');
            }
        }

        function handleGoogleCredentialResponse(response) {
            try {
                // Decode JWT token to get user info
                const userObject = parseJwt(response.credential);
                const userData = {
                    id: userObject.sub,
                    name: userObject.name,
                    email: userObject.email,
                    picture: userObject.picture,
                    provider: 'google',
                    loginTime: new Date().toISOString()
                };
                saveUser(userData);
            } catch (error) {
                console.error('Error handling Google response:', error);
                showError('Authentication failed. Please try again.');
            }
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Apple Sign-In (requires Apple Developer account)
        function initializeAppleSignIn() {
            const appleBtn = document.getElementById('appleSignIn');
            if (appleBtn) {
                appleBtn.addEventListener('click', () => {
                    showError('Apple Sign-In requires an Apple Developer account. Please use Google Sign-In for now.');
                });
            }
        }

        function continueAsGuest() {
            const guestUser = {
                id: 'guest_' + Date.now(),
                name: 'Guest',
                email: null,
                picture: null,
                provider: 'guest',
                isGuest: true,
                loginTime: new Date().toISOString()
            };
            saveUser(guestUser);
        }

        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingLogin();
            initializeGoogleSignIn();
            initializeAppleSignIn();
        });
    </script>
</body>
</html>
